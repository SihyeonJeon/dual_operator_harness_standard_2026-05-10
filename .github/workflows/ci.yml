name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  public-kit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate kit and generated harness smoke
        run: python3 scripts/validate_kit.py

      - name: Reproduce date-normalization benchmark table
        run: python3 benchmarks/date_normalization/score.py --all --check-summary
